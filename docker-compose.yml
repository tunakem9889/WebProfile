services:
  app-java:
    build: .
    image: atula449/nguyen-quoc-tuan:latest # Hãy thay 'yourusername' bằng username Docker Hub của bạn
    container_name: nguyen-quoc-tuan-app
    ports:
      - "8080:8080"
    depends_on:
      db-mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-mysql:3306/webprofile_db?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root

  db-mysql:
    image: mysql:8.0
    container_name: nguyen-quoc-tuan-db
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=webprofile_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 10s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
